[workspace]
authors = ["Mikkel Roald-Arboel <25629697+roaldarbol@users.noreply.github.com>"]
name = "pixiline"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["win-64"]

# pixiline - a generic Pixi-pipeline manager GUI.
#
# It loads a pipeline's `pixi.toml` (whose `[tasks]` ARE the pipeline steps),
# lets you pick steps + inputs, queues them, and runs/monitors the jobs. It must
# NOT depend on any pipeline's stack (torch, octron, R, ...) - those live in their
# own Pixi workspaces. An example pipeline ships alongside, in ./sleep-staging.
#
# Kept deliberately minimal.
[dependencies]
python = ">=3.11,<3.13"
pyside6 = ">=6.7"        # GUI toolkit
"ruamel.yaml" = "*"      # YAML round-trip (transitional)
pyte = "*"               # terminal emulator for the live log (ANSI colour + in-place progress)
loguru = "*"             # GUI/orchestrator session logging
ruff = "*"               # linting / formatting (dev)

# pixiline itself, installed editable so it imports as a package and exposes the
# `pixiline` entry point (run with `pixi run pixiline`). Runtime deps come from
# the conda env above.
[pypi-dependencies]
pixiline = { path = ".", editable = true }
