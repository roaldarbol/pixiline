[project]
site_name = "Pixiline"
site_description = "Run and monitor any Pixi-defined pipeline from one window."
site_author = "Mikkel Roald-Arbøl"
site_url = "https://roald-arboel.com/pixiline/"
repo_url = "https://github.com/roaldarbol/pixiline"
repo_name = "roaldarbol/pixiline"
copyright = "Copyright &copy; Mikkel Roald-Arbøl — MIT licensed. Not affiliated with Prefix.dev or the Pixi project."

# Pixiline's own Pixi-yellow-on-navy palette lives in stylesheets/extra.css, keyed
# on the `custom` primary/accent set below (see the [data-md-color-*] rules there).
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Quickstart" = [
    { "Installation" = "quickstart/installation.md" },
    { "Launch" = "quickstart/launch.md" },
  ] },
  { "Usage" = [
    { "Loading pipelines" = "loading.md" },
    { "Steps & the DAG" = "steps.md" },
    { "Inputs, settings & queueing" = "inputs.md" },
    { "Jobs & the terminal" = "jobs.md" },
  ] },
  { "Writing a pipeline" = [
    "writing-a-pipeline/index.md",
    { "A single step" = "writing-a-pipeline/single-step.md" },
    { "Two steps, wired by files" = "writing-a-pipeline/two-steps.md" },
    { "Tunable settings" = "writing-a-pipeline/settings.md" },
    { "External scripts & environments" = "writing-a-pipeline/external-scripts.md" },
    { "A branching pipeline" = "writing-a-pipeline/branching.md" },
  ] },
  { "FAQ" = "faq.md" },
  { "Credits" = "credits.md" },
]

[project.theme]
language = "en"
logo = "assets/logo.png"
favicon = "assets/logo.png"

# A pixi.sh-style left sidebar: collapsible sections (no `navigation.sections`,
# which would flatten them into always-open groups, and no `navigation.tabs`,
# which would move them into the header). `navigation.indexes` folds each
# section's overview page into its header.
features = [
  "content.code.copy",
  "content.code.annotate",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.indexes",
  "navigation.top",
  "navigation.tracking",
  "navigation.footer",
  "toc.follow",
  "search.highlight",
  "search.suggest",
]

# Match pixi.sh: Inter for body text, JetBrains Mono for code. Pixi's display
# serif (headings/titles) is the paid font "Moranga"; we substitute the free,
# similarly warm serif "Fraunces" via stylesheets/extra.css.
[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# Pixi's palette: navy chrome + a golden-yellow accent. `custom` defers the exact
# colours to stylesheets/extra.css, which mirrors Pixi's own brand variables.
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

# Per-version docs, with a version dropdown in the header (like pixi.sh). The
# selector is driven by `mike`; deploy versioned builds with
# `mike deploy <version>` so the dropdown is populated on the published site.
[project.extra.version]
provider = "mike"
default = "stable"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.emoji]
